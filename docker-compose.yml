services:
    nginx:
        container_name: "nginx-docker-compose"
        image: nginx:1.21.1
        ports:
            - "80:80"
        volumes:
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
            - ./src:/var/www/
        depends_on:
            - php

    php:
        container_name: "php-docker-compose"
        build: ./docker/php
        volumes:
            - ./src:/var/www/

    mysql:
        image: mysql:8.0.26
        container_name: "mysql-docker-compose"
        environment:
            MYSQL_ROOT_PASSWORD: password
            MYSQL_DATABASE: coachtech-furima_db
            MYSQL_USER: coachtech-furima_user
            MYSQL_PASSWORD: coachtech-furima_pass
        command:
            mysqld --default-authentication-plugin=mysql_native_password
        volumes:
            - ./docker/mysql/data:/var/lib/mysql
            - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf

    phpmyadmin:
        image: phpmyadmin/phpmyadmin:latest
        container_name: "phpmyadmin-docker-compose"
        environment:
            - PMA_ARBITRARY=1
            - PMA_HOST=mysql
            - PMA_USER=root
            - PMA_PASSWORD=password
        ports:
            - "8080:80"
        depends_on:
            - mysql

    mailpit:
        image: axllent/mailpit:latest
        container_name: "mailpit-docker-compose"
        ports:
            - "8025:8025" # ブラウザ表示用
            - "1025:1025" # メール送信用
